      operationId: lookupNamespace
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Namespace ID or domain name
        - name: version_id
          in: query
          schema:
            type: string
          description: Specific version to retrieve
        - name: as_on
          in: query
          schema:
            type: string
            format: date
          description: Historical lookup date (YYYY-MM-DD)
      responses:
        '200':
          description: Namespace retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Namespace details retrieved successfully
                  data:
                    $ref: '#/components/schemas/Namespace'
        '404':
          description: Namespace not found
          content:
