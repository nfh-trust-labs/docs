                  type: string
      responses:
        '201':
          description: Successfully subscribed to watch
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or watched resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Matching subscription already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dedi/unsubscribe:
    post:
      tags:
        - Watch & Notifications
      summary: Unsubscribe from watch notifications
      operationId: unsubscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Successfully unsubscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dedi/subscriptions:
    get:
      tags:
        - Watch & Notifications
      summary: List user subscriptions
      operationId: getSubscriptions
      responses:
        '200':
          description: Successfully retrieved subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API key authentication using Bearer token
    CookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Cookie-based authentication for browser integration

  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          description: Unique user identifier
        email:
          type: string
          format: email
          description: User email address
        name:
          type: string
          description: User display name
        created_at:
          type: string
          format: date-time
          description: User registration timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        verified:
          type: boolean
          description: Email verification status
        last_login:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp

    Namespace:
      type: object
      properties:
        namespace_id:
          type: string
          description: Unique namespace identifier
        name:
          type: string
          description: Namespace name
        description:
          type: string
          description: Namespace description
        digest:
          type: string
          description: Cryptographic digest of namespace data
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        domain:
          type: string
          description: Verified domain (if any)
        state:
          type: string
          enum: [active, archived, revoked]
          description: Current namespace state
        ttl:
          type: integer
          description: Time to live in seconds

    Registry:
      type: object
      properties:
        registry_id:
          type: string
          description: Unique registry identifier
        registry_name:
          type: string
          description: Registry name
        namespace_id:
          type: string
          description: Parent namespace ID
        description:
          type: string
          description: Registry description
        digest:
          type: string
          description: Cryptographic digest of registry data
        schema:
          type: object
          description: JSON Schema for record validation
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        state:
          type: string
          enum: [active, archived, revoked]
          description: Current registry state
        ttl:
          type: integer
          description: Time to live in seconds

    Record:
      type: object
      properties:
        record_id:
          type: string
          description: Unique record identifier
        record_name:
          type: string
          description: Record name
        registry_id:
          type: string
          description: Parent registry ID
        registry_name:
          type: string
          description: Parent registry name
        namespace_id:
          type: string
          description: Parent namespace ID
        namespace:
          type: string
          description: Parent namespace name
        description:
          type: string
          description: Record description
        digest:
          type: string
          description: Cryptographic digest of record data
        details:
          type: object
          description: Record data conforming to registry schema
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        genesis:
          type: string
          description: Original version digest
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        state:
          type: string
          enum: [draft, live, suspended, revoked, expired]
          description: Current record state
        valid_till:
          type: string
          format: date-time
          nullable: true
          description: Record expiration timestamp
        ttl:
          type: integer
          description: Time to live in seconds

    RegistrySummary:
      type: object
      properties:
        registry_id:
          type: string
        registry_name:
          type: string
        description:
          type: string
        digest:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        state:
          type: string
        record_count:
          type: integer
        ttl:
          type: integer

    RecordSummary:
      type: object
      properties:
        record_id:
          type: string
        record_name:
          type: string
        digest:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        state:
          type: string
        ttl:
          type: integer

    JobStatus:
      type: object
      properties:
        job_id:
          type: string
          description: Unique job identifier
        job_type:
          type: string
          description: Type of job (e.g., bulk_upload)
        status:
          type: string
          enum: [pending, running, completed, failed]
          description: Current job status
        progress:
          type: object
          properties:
            total:
              type: integer
              description: Total number of items to process
            processed:
              type: integer
              description: Number of items processed
            failed:
              type: integer
              description: Number of items that failed
        result:
          type: object
          description: Job result data (when completed)
        error:
          type: string
          description: Error message (if failed)
        created_at:
          type: string
          format: date-time
          description: Job creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: Operation completed successfully
        data:
          type: object
          description: Response data (optional)

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: An error occurred
        error:
          type: string
          description: Detailed error information
          example: Invalid request parameters
        code:
          type: string
          description: Error code
          example: INVALID_REQUEST

    WatchSubscription:
      type: object
      properties:
        subscription_id:
          type: string
          description: Unique subscription identifier
          example: sub_67890
        watch_type:
          type: string
          enum: [namespace, registry, record]
          description: Type of resource being watched
        target_id:
          type: string
          description: ID of the watched resource
        target_name:
          type: string
          description: Human-readable name of the watched resource
        webhook_url:
          type: string
          format: uri
          description: Webhook URL for notifications
        events:
          type: array
          items:
            type: string
            enum: [create, update, delete, state_change]
          description: Events being watched
        created_at:
          type: string
          format: date-time
          description: Subscription creation timestamp
        last_notification:
          type: string
          format: date-time
          nullable: true
          description: Last notification sent timestamp
        status:
          type: string
          enum: [active, paused, error]
          description: Current subscription status
        notification_count:
          type: integer
          description: Total number of notifications sent

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Publishing
    description: Create and manage namespaces, registries, and records
  - name: Delegation
    description: Manage user permissions and delegation
  - name: Domain Verification
    description: Domain ownership verification for namespaces
  - name: Updates
    description: Update existing namespaces, registries, and records
  - name: State Management
    description: Manage lifecycle states of registries and records
  - name: Access
    description: Lookup and retrieve individual resources
  - name: Query
    description: Query collections of resources with filtering
  - name: Versions
    description: Access version history of resources
  - name: Search
    description: Advanced search across records
  - name: Statistics
    description: Platform usage statistics and analytics
  - name: Watch & Notifications
    description: Real-time change notifications and webhooks
