            type: string
            format: date
          description: Filter registries updated from date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Filter registries updated to date (YYYY-MM-DD)
        - name: status
          in: query
          schema:
            type: string
