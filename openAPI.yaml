            type: string
          description: Namespace ID or domain name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - details
              properties:
                description:
                  type: string
                  description: Updated description
                meta:
                  type: object
                  description: Updated metadata
      responses:
        '200':
          description: Namespace updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
