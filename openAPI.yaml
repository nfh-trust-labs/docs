  # Advanced Search endpoints
  /dedi/search/{namespace}:
    get:
      tags:
        - Search
      security: []
      summary: Advanced record search
      description: |
        Powerful search functionality across all records in a namespace with support for nested field searching and flexible filtering.
        
        **Search Capabilities:**
        - Registry filtering by name
        - Record name search with partial matching
        - Direct field search in record details
        - Nested field search using dot notation
        - Multiple criteria combination
        - Case-insensitive partial matching
        
        **Field Search Examples:**
        - Basic fields: `email`, `publicKey`, `phone`, `name`
        - Nested fields: `detail.address`, `profile.name`, `contact.email`
        - Deep nesting: `data.user.profile.settings.theme`
      operationId: searchRecords
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Namespace ID or domain name to search within
        - name: registry_name
          in: query
          schema:
            type: string
          description: Filter by registry name (partial match)
        - name: record_name
          in: query
          schema:
            type: string
          description: Search by record name (partial match)
        - name: email
          in: query
          schema:
            type: string
          description: Search by email field in record details
        - name: publicKey
          in: query
          schema:
            type: string
          description: Search by publicKey field in record details
        # Dynamic parameters for nested field search
        # Note: OpenAPI doesn't support truly dynamic parameters, but we document common ones
        - name: detail.address
          in: query
          schema:
            type: string
          description: Example - Search nested field using dot notation
        - name: profile.name
          in: query
          schema:
            type: string
          description: Example - Search deeply nested field
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Search results
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        record_id:
                          type: string
                        record_name:
                          type: string
                        registry_name:
                          type: string
                        namespace_id:
                          type: string
                        description:
                          type: string
                        details:
                          type: object
                          description: Record data that can contain any fields
                        state:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        version:
                          type: string
                        ttl:
                          type: integer
        '400':
          description: Missing namespace parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Namespace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Query failed or database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Statistics endpoints
  /dedi/stats:
    get:
      tags:
        - Statistics
      summary: Get platform statistics
      description: |
        Retrieves comprehensive real-time statistics for the entire DeDi platform,
        providing insights into platform usage and growth.
        
        **Statistics Include:**
        - Total registered user accounts
        - Total namespaces across all users
        - Total registries across all namespaces
        - Total records across all registries
        
        **Public Endpoint** - No authentication required.
      operationId: getPlatformStatistics
      security: []
      responses:
        '200':
          description: Platform statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:
                    type: integer
                    description: Total number of registered user accounts
                    example: 1250
                  totalNamespaces:
                    type: integer
                    description: Total number of namespaces across all users
                    example: 456
                  totalRegistries:
                    type: integer
                    description: Total number of registries across all namespaces
                    example: 1823
                  totalRecords:
                    type: integer
                    description: Total number of records across all registries
                    example: 15467
        '500':
          description: Database connection error or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Watch & Notifications endpoints
  /dedi/subscribe:
    post:
      tags:
        - Watch & Notifications
      summary: Subscribe to watch notifications
      description: |
        Subscribe to receive webhook notifications when changes occur to registries or records.
      operationId: subscribeToWatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - webhook_url
                - webhook_secret
              properties:
                namespace:
                  type: string
                  description: Namespace ID or verified domain
                  example: my-company
                registry_name:
                  type: string
                  description: Registry name to watch
                  example: employee-profiles
                record_name:
                  type: string
                  description: Specific record name to watch
                  example: john-doe-profile
                registry_tag:
                  type: string
                  description: Watch all registries with this tag
                  example: membership
                webhook_url:
                  type: string
                  format: uri
                  description: Webhook URL to receive notifications
                  example: https://your-app.com/webhook/dedi-updates
                webhook_secret:
                  type: string
                  description: Base64-encoded secret used to sign webhook deliveries
                  example: whsec_c2VjcmV0
      responses:
        '201':
          description: Watch subscription created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully subscribed to watch
                  data:
                    $ref: '#/components/schemas/WatchSubscription'
        '400':
          description: Invalid watch parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Target resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dedi/unsubscribe:
    post:
      tags:
        - Watch & Notifications
      summary: Unsubscribe from watch notifications
      description: |
        Remove an existing watch subscription by ID.
      operationId: unsubscribeFromWatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: Watch subscription ID to remove
                  example: w_67890
      responses:
        '200':
          description: Watch subscription removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully unsubscribed
                  data:
                    $ref: '#/components/schemas/WatchSubscription'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dedi/subscriptions:
    get:
      tags:
        - Watch & Notifications
      summary: List user's watch subscriptions
      description: |
        Retrieves all watch subscriptions for the authenticated user.
      operationId: getUserWatchSubscriptions
      responses:
        '200':
          description: Watch subscriptions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully retrieved subscriptions
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WatchSubscription'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API key authentication using Bearer token
    CookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Cookie-based authentication for browser integration

  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          description: Unique user identifier
        email:
          type: string
          format: email
          description: User email address
        name:
          type: string
          description: User display name
        created_at:
          type: string
          format: date-time
          description: User registration timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        verified:
          type: boolean
          description: Email verification status
        last_login:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp

    Namespace:
      type: object
      properties:
        domain:
          type: string
          nullable: true
          description: Verified primary domain for the namespace
        namespace_id:
          type: string
          description: Unique namespace identifier
        name:
          type: string
          description: Namespace name
        description:
          type: string
          description: Namespace description
        digest:
          type: string
          description: Cryptographic digest of namespace data
        genesis:
          type: string
          format: date-time
          nullable: true
          description: Namespace genesis timestamp
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        state:
          type: string
          enum: [live]
          description: Current namespace state
        is_verified:
          type: boolean
          description: Whether the namespace currently has an active verified domain
        registry_count:
          type: integer
          description: Number of live registries in the namespace
        ttl:
          type: integer
          description: Time to live in seconds
        proof:
          $ref: '#/components/schemas/NamespaceProof'

    Registry:
      type: object
      properties:
        namespace:
          type: string
          description: Namespace name or primary domain
        namespace_id:
          type: string
          description: Parent namespace ID
        registry_id:
          type: string
          description: Unique registry identifier
        registry_name:
          type: string
          description: Registry name
        description:
          type: string
          description: Registry description
        digest:
          type: string
          description: Cryptographic digest of registry data
        tag:
          type: string
          nullable: true
          description: Schema tag associated with the registry
        schema:
          type: object
          description: JSON Schema for record validation
        genesis:
          type: string
          format: date-time
          nullable: true
          description: Registry genesis timestamp
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        state:
          type: string
          enum: [live, inactive]
          description: Current registry state
        record_count:
          type: integer
          description: Number of live records in the registry
        query_allowed:
          type: boolean
          description: Whether the registry is queryable
        ttl:
          type: integer
          description: Time to live in seconds
        proof:
          $ref: '#/components/schemas/RegistryProof'

    Record:
      type: object
      properties:
        namespace:
          type: string
          description: Parent namespace name or primary domain
        namespace_id:
          type: string
          description: Parent namespace ID
        registry_id:
          type: string
          description: Parent registry ID
        registry_name:
          type: string
          description: Parent registry name
        record_id:
          type: string
          description: Unique record identifier
        record_name:
          type: string
          description: Record name
        description:
          type: string
          description: Record description
        digest:
          type: string
          description: Cryptographic digest of record data
        schema:
          type: object
          description: Registry schema associated with the record
        details:
          type: object
          description: Record data conforming to registry schema
        meta:
          type: object
          description: Additional metadata
        version:
          type: string
          description: Current version
        version_count:
          type: integer
          description: Total number of versions
        genesis:
          type: string
          format: date-time
          nullable: true
          description: Record genesis timestamp
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          description: Creator user ID
        state:
          type: string
