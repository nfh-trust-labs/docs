  /dedi/{namespace}/{registry_name}/update-registry:
    post:
      tags:
        - Updates
      summary: Update registry
      description: |
        Updates registry information including description, schema, and metadata.
        Schema updates must be backward compatible.
      operationId: updateRegistry
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Namespace ID or domain name
        - name: registry_name
          in: path
          required: true
          schema:
            type: string
          description: Registry name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Updated description
                schema:
                  type: object
                  description: Updated JSON Schema (must be backward compatible)
                meta:
                  type: object
                  description: Updated metadata
      responses:
        '200':
          description: Registry updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dedi/{namespace}/{registry_name}/{record_name}/update-record:
    post:
      tags:
        - Updates
      summary: Update record
      description: |
        Updates record information including description, details, and metadata.
        Creates a new version of the record while preserving history.
      operationId: updateRecord
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Namespace ID or domain name
        - name: registry_name
          in: path
          required: true
          schema:
            type: string
          description: Registry name
        - name: record_name
          in: path
          required: true
          schema:
            type: string
          description: Record name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Updated description
                details:
                  type: object
                  description: Updated record data
                meta:
                  type: object
                  description: Updated metadata
                valid_till:
                  type: string
                  format: date-time
                  description: Updated expiration date in ISO format
                  example: 2024-12-31T23:59:59Z
                ttl:
                  type: integer
                  description: Updated time to live in seconds
      responses:
        '200':
          description: Draft record edited in place or live record version created
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Record edit successful
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Record updated
                      data:
                        type: object
                        properties:
                          digest:
                            type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

